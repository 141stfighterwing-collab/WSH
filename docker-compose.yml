services:
  weavenote:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "3.4.4"
    container_name: weavenote-app
    image: weavenote:latest
    ports:
      - "${WSH_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=file:/app/db/custom.db
      - AI_SYNTHESIS_MODEL=${AI_SYNTHESIS_MODEL:-glm-4-flash}
      - AI_SYNTHESIS_TEMPERATURE=${AI_SYNTHESIS_TEMPERATURE:-0.7}
      - AI_SYNTHESIS_MAX_TOKENS=${AI_SYNTHESIS_MAX_TOKENS:-4096}
      - AI_DAILY_LIMIT=${AI_DAILY_LIMIT:-800}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_DEFAULT_USERNAME=${ADMIN_DEFAULT_USERNAME:-admin}
      - ADMIN_DEFAULT_EMAIL=${ADMIN_DEFAULT_EMAIL:-admin@wsh.local}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin123}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - weavenote-data:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  weavenote-data:
    driver: local
