# ==============================================================================
# WSH (Weavenote Self Hosted) - Docker Compose Configuration
# ==============================================================================
# Standalone Docker Compose file for WSH deployment
# Generated for version 2.5.0
# ==============================================================================
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose down               # Stop all services
#   docker-compose logs -f            # View logs
#   docker-compose --profile admin up -d  # Start with pgAdmin
#
# Prerequisites:
#   - Docker Desktop installed and running
#   - Ports 3000, 5432, 5682 (and 5050 for pgAdmin) available
#   - Environment variables configured in .env file
#
# ==============================================================================

services:

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: wsh-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wsh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wsh_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-wsh_db}
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wsh} -d ${POSTGRES_DB:-wsh_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    networks:
      - wsh-network

  # ============================================================================
  # WSH Application
  # ============================================================================
  app:
    image: ghcr.io/141stfighterwing-collab/wsh:latest
    container_name: wsh-app
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
    
    environment:
      # Database Connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-wsh}:${POSTGRES_PASSWORD:-wsh_secure_password}@postgres:5432/${POSTGRES_DB:-wsh_db}?schema=public
      
      # Server binding (CRITICAL for Docker)
      HOST: "0.0.0.0"
      PORT: "3000"
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Application Configuration
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-WSH - Weavenote Self Hosted}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # Admin Configuration
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wsh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-Admin}
    
    ports:
      - "${APP_PORT:-3000}:3000"
      - "5682:5682"  # Database Viewer Web UI
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    
    healthcheck:
      test: ["CMD", "pwsh", "-NoProfile", "-Command", "& /app/healthcheck.ps1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s
    
    networks:
      - wsh-network

  # ============================================================================
  # pgAdmin (Database Management UI) - Optional
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wsh-pgadmin
    restart: unless-stopped
    
    profiles:
      - admin
    
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@wsh.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    
    depends_on:
      - postgres
    
    networks:
      - wsh-network

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres_data:
    name: wsh_postgres_data

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  wsh-network:
    name: wsh-network
    driver: bridge
