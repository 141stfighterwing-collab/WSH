<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer hexagonal shape -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="url(#grad)" rx="4"/>
  <!-- Inner weave pattern - horizontal lines -->
  <line x1="25" y1="35" x2="75" y2="35" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <line x1="25" y1="65" x2="75" y2="65" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <!-- Inner weave pattern - vertical lines -->
  <line x1="35" y1="25" x2="35" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="50" y1="20" x2="50" y2="80" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="65" y1="25" x2="65" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Center node circle -->
  <circle cx="50" cy="50" r="8" fill="rgba(255,255,255,0.9)"/>
  <circle cx="50" cy="50" r="4" fill="url(#grad)"/>
  <!-- Corner nodes -->
  <circle cx="50" cy="18" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="78" cy="34" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="78" cy="66" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="50" cy="82" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="22" cy="66" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="22" cy="34" r="3" fill="rgba(255,255,255,0.7)"/>
  <!-- Connection lines from center to corners -->
  <line x1="50" y1="42" x2="50" y2="21" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="57" y1="46" x2="75" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="57" y1="54" x2="75" y2="64" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="50" y1="58" x2="50" y2="79" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="43" y1="54" x2="25" y2="64" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="43" y1="46" x2="25" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>
