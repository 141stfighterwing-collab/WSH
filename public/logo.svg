<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1408 768" width="1408" height="768">
  <rect width="1408" height="768" fill="white"/>
  <!-- Placeholder - actual logo is in logo.png -->
  <!-- Hexagonal WSH brand mark -->
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0E7490;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#155E75;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="704,80 1040,240 1040,528 704,688 368,528 368,240" fill="url(#hexGrad)" stroke="none"/>
  <!-- Inner web pattern -->
  <line x1="704" y1="150" x2="704" y2="618" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="400" y1="300" x2="1008" y2="300" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="400" y1="468" x2="1008" y2="468" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="480" y1="180" x2="928" y2="588" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="480" y1="588" x2="928" y2="180" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Pen nib center -->
  <polygon points="704,260 740,400 704,540 668,400" fill="rgba(255,255,255,0.9)"/>
  <polygon points="704,300 724,400 704,460 684,400" fill="url(#hexGrad)"/>
  <!-- WSH Text -->
  <text x="704" y="730" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="#1E293B">WeaveNote</text>
  <text x="704" y="758" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="20" fill="#94A3B8">Your Ideas, Connected.</text>
</svg>
